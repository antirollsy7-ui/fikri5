<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fikri'nin Yemini</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            background-color: #000;
            font-family: 'Teko', sans-serif;
            color: #fff;
            position: relative;
        }

        #portrait-warning {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: #0d0e15;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
        .phone-icon {
            width: 60px; height: 100px;
            border: 4px solid #ff3e3e;
            border-radius: 10px; margin-bottom: 20px;
            position: relative;
            animation: rotatePhone 2s ease-in-out infinite;
        }
        .phone-icon::after {
            content: ''; position: absolute;
            bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 10px;
            border: 2px solid #ff3e3e; border-radius: 50%;
        }
        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }
        #portrait-warning h2 { font-size: 24px; color: #ffcc00; margin-bottom: 12px; }
        #portrait-warning p { font-size: 16px; color: #888; }

        #game-container {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%; height: 100%;
            background-color: #2c3e50;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: none; 
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 10;
        }
        .btn-group {
            display: flex; gap: 20px; pointer-events: auto;
        }
        .control-btn {
            width: 75px; height: 75px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; font-weight: bold;
            color: rgba(255,255,255,0.8);
            touch-action: manipulation;
            box-shadow: 0 4px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }
        .control-btn:active {
            background-color: rgba(255, 255, 255, 0.4);
            transform: scale(0.92);
        }

        @media (orientation: landscape) {
            #portrait-warning { display: none; }
            #game-container { display: block; }
        }
    </style>
</head>
<body>

    <div id="portrait-warning">
        <div class="phone-icon"></div>
        <h2>FİKRİ'NİN YEMİNİ</h2>
        <p>Oyunu tam ekranda oynamak için cihazı yatay çevirin.</p>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <div class="btn-group">
                <div class="control-btn" id="btn-left">◀</div>
                <div class="control-btn" id="btn-right">▶</div>
            </div>
            <div class="btn-group">
                <div class="control-btn" id="btn-attack" style="border-color: #e74c3c; color: #e74c3c;">A</div>
                <div class="control-btn" id="btn-jump" style="border-color: #3498db; color: #3498db;">B</div>
            </div>
        </div>
    </div>

    <script>
        // ======================= TAM EKRAN =======================
        function requestFullScreen() {
            let doc = window.document;
            let docEl = doc.documentElement;
            let req = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if(req) { req.call(docEl).catch(err => console.log("Tam ekran reddedildi: ", err)); }
        }

        // ======================= SES MOTORU =======================
        class RetroAudio {
            constructor() { this.ctx = null; }
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            play(type) {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                if (type === 'jump') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(400, this.ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.1);
                } else if (type === 'punch') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                    osc.frequency.setValueAtTime(80, this.ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.08);
                } else if (type === 'hit') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, this.ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(40, this.ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.15);
                } else if (type === 'coin') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(900, this.ctx.currentTime);
                    osc.frequency.setValueAtTime(1300, this.ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.2);
                } else if (type === 'boss') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, this.ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(200, this.ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.3);
                }
            }
        }
        const sound = new RetroAudio();

        // ======================= OYUN DEĞİŞKENLERİ =======================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'menu'; 
        let keys = { left: false, right: false };
        let touchKeys = { left: false, right: false };
        let camera = { x: 0, y: 0 };
        let screenShake = 0;
        let gameTime = 0;
        let score = 0;

        let particles = [];
        let enemies = [];
        let coins = [];
        let raindrops = [];
        let platforms = [];
        let obstacles = [];
        let decorations = [];

        const GRAVITY = 0.65;
        let groundY = 0; 

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height * 0.85; 
            platforms.length = 0;
            platforms.push({ x: -1000, y: groundY, width: 5000, height: canvas.height });
            // Parkur engelleri
            obstacles = [
                { x: 400, y: groundY - 30, w: 30, h: 30 },
                { x: 800, y: groundY - 50, w: 30, h: 50 },
                { x: 1200, y: groundY - 40, w: 30, h: 40 },
                { x: 1600, y: groundY - 60, w: 30, h: 60 },
                { x: 2000, y: groundY - 35, w: 30, h: 35 },
            ];
            // Dekorasyon
            decorations = [];
            for (let i = 0; i < 30; i++) {
                decorations.push({
                    x: Math.random() * 3000,
                    y: groundY - 5 - Math.random() * 15,
                    size: 3 + Math.random() * 8,
                    type: Math.random() > 0.5 ? 'tree' : 'bush'
                });
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let menuPlayBtn = { x: 0, y: 0, w: 280, h: 60 };
        let cutsceneTimer = 0;
        let cutsceneStage = 0;
        let cutsceneData = {
            danX: -100, josieX: canvas.width/2, soldierX: canvas.width + 100,
            text: "", panel: 0, fade: 0, page: 0, subtitle: ""
        };

        // ======================= ÇİZİM YARDIMCILARI =======================
        function drawVectorLimb(ctx, x1, y1, x2, y2, color, thickness) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.lineWidth = thickness;
            ctx.lineCap = 'round';
            ctx.strokeStyle = color;
            ctx.stroke();
        }

        function drawRoundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // ======================= OYUNCU (FİKRİ) =======================
        class Player {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.width = 30; this.height = 60;
                this.vx = 0; this.vy = 0;
                this.speed = 5.5; this.jumpForce = -14;
                this.grounded = false; this.doubleJumpAvailable = true;
                this.facing = 1; 
                this.health = 100; this.maxHealth = 100;
                this.coins = 0;
                this.state = 'idle'; 
                this.animTimer = 0; this.stateTimer = 0;
                this.isInvincible = 0;
                this.bandana = true;
                this.comboCount = 0;
                this.comboTimer = 0;
                this.attackCooldown = 0;
            }

            update() {
                let moveDir = 0;
                if (keys.left || touchKeys.left) moveDir = -1;
                else if (keys.right || touchKeys.right) moveDir = 1;

                if (this.isInvincible > 0) this.isInvincible--;
                if (this.comboTimer > 0) this.comboTimer--;
                else this.comboCount = 0;
                if (this.attackCooldown > 0) this.attackCooldown--;

                if (!['punch1', 'punch2', 'kick', 'hurt'].includes(this.state)) {
                    this.vx = moveDir * this.speed;
                    if (moveDir !== 0) { this.facing = moveDir; this.state = 'running'; }
                    else { this.state = 'idle'; }
                } else {
                    this.vx *= 0.8;
                }

                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;

                this.grounded = false;
                for (let plat of platforms) {
                    if (this.x + this.width/2 > plat.x && this.x - this.width/2 < plat.x + plat.width) {
                        if (this.y + this.height >= plat.y && this.y + this.height - this.vy <= plat.y + 15 && this.vy >= 0) {
                            this.y = plat.y - this.height;
                            this.vy = 0;
                            this.grounded = true;
                            this.doubleJumpAvailable = true;
                        }
                    }
                }

                // Engellerle çarpışma
                for (let obs of obstacles) {
                    if (this.x + this.width/2 > obs.x && this.x - this.width/2 < obs.x + obs.w) {
                        if (this.y + this.height > obs.y && this.y < obs.y + obs.h) {
                            if (this.vx > 0) { this.x = obs.x - this.width/2; }
                            else if (this.vx < 0) { this.x = obs.x + obs.w + this.width/2; }
                            this.vx = 0;
                            this.takeDamage(5, this.facing * -1);
                        }
                    }
                }

                if (!this.grounded && !['punch1', 'punch2', 'kick', 'hurt'].includes(this.state)) {
                    this.state = this.vy < 0 ? 'jumping' : 'falling';
                }

                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    if (this.stateTimer === 0) this.state = 'idle';
                }
                this.animTimer += 0.2;
            }

            jump() {
                if (this.state === 'hurt' || gameState !== 'playing') return;
                if (this.grounded) {
                    this.vy = this.jumpForce; this.grounded = false;
                    sound.play('jump');
                    for (let i = 0; i < 8; i++) {
                        particles.push(new Particle(this.x + (Math.random()-0.5)*20, this.y + this.height, '#a8d8ea'));
                    }
                } else if (this.doubleJumpAvailable) {
                    this.vy = this.jumpForce * 0.9; this.doubleJumpAvailable = false;
                    sound.play('jump');
                    for (let i = 0; i < 8; i++) {
                        particles.push(new Particle(this.x + (Math.random()-0.5)*20, this.y + this.height/2, '#52b3ff'));
                    }
                }
            }

            attack() {
                if (this.state === 'hurt' || gameState !== 'playing') return;
                if (this.attackCooldown > 0) return;
                sound.play('punch');
                this.attackCooldown = 5;
                this.comboCount++;
                this.comboTimer = 30;
                
                let damage = 15 + Math.floor(this.comboCount / 3) * 5;
                
                if (this.state !== 'punch1' && this.state !== 'punch2' && this.state !== 'kick') {
                    this.state = 'punch1'; this.stateTimer = 12; this.executeHitbox(40, damage);
                } else if (this.state === 'punch1' && this.stateTimer < 8) {
                    this.state = 'punch2'; this.stateTimer = 12; this.executeHitbox(45, damage + 5);
                } else if (this.state === 'punch2' && this.stateTimer < 8) {
                    this.state = 'kick'; this.stateTimer = 16; this.executeHitbox(55, damage + 10);
                }
            }

            executeHitbox(range, damage) {
                let hitX = this.facing === 1 ? this.x + this.width/2 : this.x - this.width/2 - range;
                let hitY = this.y + 15;
                let hitCount = 0;

                enemies.forEach(enemy => {
                    if (enemy.health > 0 && hitX + range > enemy.x - enemy.width/2 && hitX < enemy.x + enemy.width/2 && hitY + 30 > enemy.y && hitY < enemy.y + enemy.height) {
                        enemy.takeDamage(damage, this.facing);
                        screenShake = 12;
                        hitCount++;
                        score += 10;
                        // Kan efekti
                        for (let i = 0; i < 10; i++) {
                            particles.push(new Particle(
                                enemy.x + (Math.random()-0.5)*30,
                                enemy.y + (Math.random()-0.5)*30,
                                '#e74c3c'
                            ));
                        }
                    }
                });

                if (hitCount > 0) {
                    sound.play('hit');
                    this.comboCount += hitCount;
                }
            }

            takeDamage(damage, dir) {
                if (this.isInvincible > 0) return;
                this.health -= damage;
                this.state = 'hurt'; this.stateTimer = 20;
                this.vy = -4; this.vx = dir * 5;
                this.isInvincible = 50;
                sound.play('hit');
                for (let i = 0; i < 15; i++) {
                    particles.push(new Particle(
                        this.x + (Math.random()-0.5)*40,
                        this.y + (Math.random()-0.5)*40,
                        '#ff6b6b'
                    ));
                }
                screenShake = 15;

                if (this.health <= 0) {
                    this.health = 0;
                    this.state = 'dead';
                    setTimeout(() => { 
                        this.health = 100; 
                        this.x = 100; 
                        this.y = groundY - 100; 
                        this.state = 'idle';
                        gameState = 'menu';
                    }, 2000);
                }
            }

            draw(c = ctx) {
                if (this.isInvincible % 6 > 3 && this.state !== 'dead') return;
                c.save();
                c.translate(this.x, this.y);
                if (this.facing === -1) c.scale(-1, 1);

                let skin = '#fbc531';
                let shirt = '#273c75';
                let pants = '#2f3640';
                let swing = Math.sin(this.animTimer) * 15;
                let leg1 = 0, leg2 = 0, arm1 = 0, arm2 = 0;
                if (this.state === 'running') { leg1 = swing; leg2 = -swing; arm1 = -swing; arm2 = swing; }
                else if (this.state === 'jumping' || this.state === 'falling') { leg1 = -10; leg2 = 10; arm1 = -20; arm2 = 20; }
                else if (this.state === 'dead') { leg1 = 20; leg2 = -20; arm1 = 30; arm2 = -30; }

                // Arka bacak
                drawVectorLimb(c, 0, 30, leg2, 55, pants, 10);
                // Arka kol
                if (this.state === 'punch1') drawVectorLimb(c, 0, 15, 20, 15, shirt, 8);
                else if (this.state === 'punch2') drawVectorLimb(c, 0, 15, 30, 5, shirt, 8);
                else drawVectorLimb(c, 0, 15, arm2, 35, shirt, 8);

                // Gövde
                c.fillStyle = shirt;
                c.beginPath(); drawRoundRect(c, -10, 10, 20, 25, 5); c.fill();
                c.fillStyle = '#f1c40f';
                c.fillRect(-11, 30, 22, 5);

                // Kafa
                c.fillStyle = skin;
                c.beginPath(); c.arc(0, 0, 14, 0, Math.PI*2); c.fill();
                c.fillStyle = '#000'; c.fillRect(4, -3, 3, 3);
                c.fillRect(-7, -3, 3, 3);
                // Bandana
                c.fillStyle = '#e84118'; c.fillRect(-14, -8, 28, 6);
                c.beginPath(); c.moveTo(-14, -8); c.lineTo(-25, -2); c.lineTo(-14, -2); c.fill();
                c.fillStyle = '#fff'; c.font = 'bold 5px Teko'; c.textAlign = 'center';
                c.fillText('FİKRİ', 0, -4);

                // Ön bacak
                if (this.state === 'kick') drawVectorLimb(c, 0, 30, 35, 20, pants, 10);
                else drawVectorLimb(c, 0, 30, leg1, 55, pants, 10);
                // Ön kol
                if (this.state === 'punch2') drawVectorLimb(c, 0, 15, 25, 15, shirt, 8);
                else if (this.state !== 'punch1' && this.state !== 'kick') drawVectorLimb(c, 0, 15, arm1, 35, shirt, 8);

                c.restore();

                // Combo göstergesi
                if (this.comboCount > 0 && this.comboTimer > 0) {
                    c.fillStyle = 'rgba(0,0,0,0.7)';
                    drawRoundRect(c, this.x - 30, this.y - 80, 60, 25, 10);
                    c.fill();
                    c.fillStyle = '#f1c40f';
                    c.font = 'bold 18px Teko';
                    c.textAlign = 'center';
                    c.fillText(`COMBO x${this.comboCount}`, this.x, this.y - 63);
                }
            }
        }

        const player = new Player(100, 200);

        // ======================= DÜŞMAN (KÜFÜRLÜ KONUŞAN ASKER) =======================
        class Soldier {
            constructor(x, y, type = 'normal') {
                this.x = x; this.y = y;
                this.width = 30; this.height = 60;
                this.vx = -1.5; this.vy = 0;
                this.health = type === 'boss' ? 80 : 50;
                this.maxHealth = this.health;
                this.facing = -1;
                this.state = 'patrol'; this.stateTimer = 0;
                this.startX = x; this.animTimer = Math.random() * 10;
                this.speechTimer = 0;
                this.speechText = '';
                this.type = type;
                this.isBoss = type === 'boss';
                this.attackCooldown = 0;
                this.rageMode = false;
            }

            update() {
                if (this.state === 'dead') return;
                this.vy += GRAVITY; this.y += this.vy;
                platforms.forEach(plat => {
                    if (this.x + this.width/2 > plat.x && this.x - this.width/2 < plat.x + plat.width) {
                        if (this.y + this.height >= plat.y && this.y + this.height - this.vy <= plat.y + 15 && this.vy >= 0) {
                            this.y = plat.y - this.height; this.vy = 0;
                        }
                    }
                });

                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.health < this.maxHealth * 0.3) this.rageMode = true;

                let dist = Math.abs(player.x - this.x);
                if (this.state === 'hurt') {
                    this.vx *= 0.8; this.stateTimer--;
                    if (this.stateTimer <= 0) this.state = 'patrol';
                } else if (dist < 250 && Math.abs(player.y - this.y) < 100) {
                    this.state = 'chase';
                    this.facing = player.x > this.x ? 1 : -1;
                    this.vx = this.facing * (this.rageMode ? 3.5 : 2.5);
                    if (dist < 60 && this.attackCooldown === 0) {
                        this.state = 'attack'; this.vx = 0;
                        let dmg = this.rageMode ? 20 : 10;
                        player.takeDamage(dmg, this.facing);
                        sound.play('hit');
                        this.attackCooldown = 30;
                        const insults = [
                            "SİKECEĞİM AMINI!",
                            "ÇATIR ÇATIR SİKERİM!",
                            "DİLİMİ SOKARIM!",
                            "AMINI PATLATIRIM!",
                            "SÜRÜNÜRÜM SENİ!",
                            "ANANI SİKERİM!",
                            "GÖTÜNE SOKARIM!"
                        ];
                        this.speechText = insults[Math.floor(Math.random() * insults.length)];
                        this.speechTimer = 70;
                        // Ses efekti
                        sound.play('boss');
                    }
                } else {
                    this.state = 'patrol';
                    if (this.x > this.startX + (this.isBoss ? 200 : 100)) { this.facing = -1; this.vx = this.rageMode ? -2.5 : -1.5; }
                    else if (this.x < this.startX - (this.isBoss ? 200 : 100)) { this.facing = 1; this.vx = this.rageMode ? 2.5 : 1.5; }
                }
                this.x += this.vx;
                this.animTimer += 0.2;
                if (this.speechTimer > 0) this.speechTimer--;
            }

            takeDamage(damage, dir) {
                this.health -= damage; 
                this.state = 'hurt'; this.stateTimer = 15;
                this.vx = dir * (this.isBoss ? 3 : 4.5);
                sound.play('hit');
                screenShake = this.isBoss ? 20 : 12;
                
                if (this.health <= 0) {
                    this.state = 'dead';
                    score += this.isBoss ? 100 : 50;
                    for (let i = 0; i < (this.isBoss ? 8 : 3); i++) {
                        coins.push(new Coin(this.x + (Math.random()-0.5)*60, this.y + 20));
                    }
                    // Patlama efekti
                    for (let i = 0; i < 30; i++) {
                        particles.push(new Particle(
                            this.x + (Math.random()-0.5)*60,
                            this.y + (Math.random()-0.5)*60,
                            ['#e74c3c', '#f1c40f', '#ff6b6b', '#fff'][Math.floor(Math.random()*4)]
                        ));
                    }
                }
            }

            draw() {
                if (this.state === 'dead') return;
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.facing === -1) ctx.scale(-1, 1);

                let swing = Math.sin(this.animTimer) * 10;
                let leg1 = 0, leg2 = 0;
                if (this.vx !== 0) { leg1 = swing; leg2 = -swing; }

                let vest = this.isBoss ? '#c0392b' : '#4cd137';
                let uniform = '#2f3640'; let skin = '#fbc531';
                let helmet = this.isBoss ? '#8e44ad' : '#c23616';

                drawVectorLimb(ctx, 0, 30, leg2, 55, uniform, 10);
                drawVectorLimb(ctx, 0, 30, leg1, 55, uniform, 10);
                ctx.fillStyle = vest; ctx.beginPath(); drawRoundRect(ctx, -10, 10, 20, 25, 5); ctx.fill();
                drawVectorLimb(ctx, -5, 15, 15, 25, uniform, 8);
                ctx.fillStyle = '#7f8fa6'; ctx.fillRect(5, 20, 25, 6);
                drawVectorLimb(ctx, 5, 15, 25, 22, uniform, 8);
                ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = helmet; ctx.beginPath(); ctx.arc(0, -2, 13, Math.PI, 0); ctx.fill();

                // Can barı
                ctx.fillStyle = '#000'; ctx.fillRect(-20, -30, 40, 5);
                let healthColor = this.health / this.maxHealth > 0.5 ? '#2ecc71' : '#e74c3c';
                ctx.fillStyle = healthColor; ctx.fillRect(-20, -30, (this.health / this.maxHealth) * 40, 5);

                // Rage modu efekti
                if (this.rageMode) {
                    ctx.strokeStyle = '#e74c3c';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.stroke();
                }

                // Konuşma balonu
                if (this.speechTimer > 0) {
                    ctx.fillStyle = 'rgba(0,0,0,0.85)';
                    drawRoundRect(ctx, -45, -55, 90, 30, 10);
                    ctx.fill();
                    ctx.fillStyle = '#ff3e3e';
                    ctx.font = 'bold 14px Teko';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.speechText, 0, -35);
                    // Baloncuk çizgisi
                    ctx.beginPath(); ctx.moveTo(-10, -25); ctx.lineTo(0, -15); ctx.lineTo(10, -25); ctx.strokeStyle = 'rgba(0,0,0,0.85)'; ctx.lineWidth = 2; ctx.stroke();
                }

                ctx.restore();
            }
        }

        // ======================= COIN =======================
        class Coin {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 6; this.vy = -Math.random() * 5 - 3;
                this.radius = 8; this.collected = false;
                this.bob = Math.random() * Math.PI * 2;
            }
            update() {
                if (this.collected) return;
                this.bob += 0.05;
                this.vy += GRAVITY; 
                this.x += this.vx; 
                this.y += this.vy;
                if (this.y + this.radius >= groundY) {
                    this.y = groundY - this.radius; 
                    this.vy = -this.vy * 0.5; 
                    this.vx *= 0.6;
                }
                let dx = player.x - this.x; 
                let dy = (player.y + player.height/2) - this.y;
                if (Math.sqrt(dx*dx + dy*dy) < 35) {
                    this.collected = true; 
                    player.coins++; 
                    score += 15;
                    sound.play('coin');
                    for (let i = 0; i < 12; i++) {
                        particles.push(new Particle(
                            this.x + (Math.random()-0.5)*20,
                            this.y + (Math.random()-0.5)*20,
                            '#f1c40f'
                        ));
                    }
                }
            }
            draw() {
                if (this.collected) return;
                let scale = 1 + Math.sin(this.bob) * 0.15;
                ctx.beginPath(); 
                ctx.ellipse(this.x, this.y, this.radius * scale, this.radius, 0, 0, Math.PI*2);
                ctx.fillStyle = '#f1c40f'; ctx.fill();
                ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 2; ctx.stroke();
                // Parlama
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.ellipse(this.x - 2, this.y - 3, 3, 2, 0.5, 0, Math.PI*2); ctx.fill();
            }
        }

        // ======================= PARTİKÜL =======================
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random()-0.5)*5; 
                this.vy = (Math.random()-0.5)*5 - 2;
                this.color = color; 
                this.size = Math.random()*6
